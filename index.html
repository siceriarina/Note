<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Mini Planner App</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6fa;
}

header {
  background: #2f80ed;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, textarea, button {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  background: #2f80ed;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #1f66c2;
}

.item {
  background: #f1f2f6;
  margin-top: 8px;
  padding: 8px;
  border-radius: 6px;
  position: relative;
}

.delete {
  position: absolute;
  right: 8px;
  top: 6px;
  color: red;
  cursor: pointer;
  font-weight: bold;
}

/* CALENDAR */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: 10px;
}

.day {
  background: #eee;
  padding: 8px;
  text-align: center;
  border-radius: 6px;
  font-size: 12px;
}

.today {
  background: #2f80ed;
  color: white;
}

.event {
  background: #27ae60;
  color: white;
  margin-top: 2px;
  font-size: 10px;
  border-radius: 4px;
  padding: 2px;
}

small {
  color: gray;
}

</style>
</head>

<body>

<header>
  <h2>📒 Mini Planner App</h2>
</header>

<div class="container">

<!-- NOTES -->
<div class="card">
  <h3>📝 Notes</h3>
  <textarea id="noteInput" placeholder="Tulis catatan..."></textarea>
  <button onclick="addNote()">Tambah Note</button>
  <div id="noteList"></div>
</div>

<!-- AGENDA -->
<div class="card">
  <h3>📅 Agenda</h3>
  <input id="agendaText" placeholder="Kegiatan">
  <input type="date" id="agendaDate">
  <button onclick="addAgenda()">Tambah Agenda</button>
  <div id="agendaList"></div>
</div>

<!-- REMINDER -->
<div class="card">
  <h3>⏰ Reminder</h3>
  <input id="reminderText" placeholder="Isi reminder">
  <input type="datetime-local" id="reminderTime">
  <button onclick="addReminder()">Set Reminder</button>
  <div id="reminderList"></div>
</div>

<!-- CALENDAR -->
<div class="card">
  <h3>🗓 Kalender Mini</h3>
  <div id="calendar"></div>
</div>

</div>

<script>

// =====================
// DATA STORAGE
// =====================
let notes = JSON.parse(localStorage.getItem("notes")) || [];
let agendas = JSON.parse(localStorage.getItem("agendas")) || [];
let reminders = JSON.parse(localStorage.getItem("reminders")) || [];

// =====================
// SAVE DATA
// =====================
function save() {
  localStorage.setItem("notes", JSON.stringify(notes));
  localStorage.setItem("agendas", JSON.stringify(agendas));
  localStorage.setItem("reminders", JSON.stringify(reminders));
}

// =====================
// NOTES
// =====================
function addNote() {
  let val = document.getElementById("noteInput").value;
  if (!val) return;

  notes.push(val);
  document.getElementById("noteInput").value = "";

  save();
  render();
}

function deleteNote(i) {
  notes.splice(i, 1);
  save();
  render();
}

// =====================
// AGENDA
// =====================
function addAgenda() {
  let text = document.getElementById("agendaText").value;
  let date = document.getElementById("agendaDate").value;

  if (!text || !date) return;

  agendas.push({ text, date });

  document.getElementById("agendaText").value = "";

  save();
  render();
}

function deleteAgenda(i) {
  agendas.splice(i, 1);
  save();
  render();
}

// =====================
// REMINDER (MANUAL)
// =====================
function addReminder() {
  let text = document.getElementById("reminderText").value;
  let time = document.getElementById("reminderTime").value;

  if (!text || !time) return;

  let reminder = {
    text,
    time: new Date(time).getTime()
  };

  reminders.push(reminder);

  document.getElementById("reminderText").value = "";
  document.getElementById("reminderTime").value = "";

  save();
  scheduleReminder(reminder);
  render();
}

// =====================
// NOTIFICATION SCHEDULER
// =====================
function scheduleReminder(r) {
  let delay = r.time - Date.now();
  if (delay < 0) return;

  setTimeout(() => {
    if (Notification.permission === "granted") {
      new Notification("⏰ Reminder", {
        body: r.text
      });
    } else {
      alert("Reminder: " + r.text);
    }
  }, delay);
}

// =====================
// CALENDAR
// =====================
function renderCalendar() {
  let el = document.getElementById("calendar");
  el.innerHTML = "";

  let now = new Date();
  let year = now.getFullYear();
  let month = now.getMonth();

  let lastDay = new Date(year, month + 1, 0).getDate();

  for (let i = 1; i <= lastDay; i++) {
    let div = document.createElement("div");
    div.className = "day";

    if (i === now.getDate()) {
      div.classList.add("today");
    }

    div.innerHTML = i;

    agendas.forEach(a => {
      let d = parseInt(a.date.split("-")[2]);
      if (d === i) {
        let ev = document.createElement("div");
        ev.className = "event";
        ev.innerText = a.text;
        div.appendChild(ev);
      }
    });

    el.appendChild(div);
  }
}

// =====================
// RENDER ALL
// =====================
function render() {

  document.getElementById("noteList").innerHTML =
    notes.map((n, i) => `
      <div class="item">${n}
      <span class="delete" onclick="deleteNote(${i})">X</span>
      </div>
    `).join("");

  document.getElementById("agendaList").innerHTML =
    agendas.map((a, i) => `
      <div class="item">
        ${a.text}<br><small>${a.date}</small>
        <span class="delete" onclick="deleteAgenda(${i})">X</span>
      </div>
    `).join("");

  document.getElementById("reminderList").innerHTML =
    reminders.map(r => `
      <div class="item">
        ${r.text}<br><small>${new Date(r.time).toLocaleString()}</small>
      </div>
    `).join("");

  renderCalendar();
}

// =====================
// INIT APP
// =====================
if ("Notification" in window) {
  Notification.requestPermission();
}

reminders.forEach(scheduleReminder);
render();

</script>

</body>
</html>
