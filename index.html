<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f6fa;
}

/* HEADER */
header {
  background: #2f80ed;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

/* CONTAINER */
.container {
  padding: 12px;
}

/* INPUT BOX */
.input-box {
  display: flex;
  gap: 8px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

button {
  padding: 12px 16px;
  border: none;
  background: #2f80ed;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #1f66c2;
}

/* NOTES */
.note {
  background: white;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  position: relative;

  /* FIX TEKS PANJANG */
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: pre-wrap;
}

/* DELETE */
.delete {
  position: absolute;
  right: 10px;
  top: 8px;
  color: red;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
📝 Notes App
</header>

<div class="container">

  <div class="input-box">
    <input id="inputNote" placeholder="Tulis catatan...">
    <button onclick="addNote()">+</button>
  </div>

  <div id="list"></div>

</div>

<script>

// =====================
// LOAD DATA
// =====================
let notes = JSON.parse(localStorage.getItem("notes")) || [];

// =====================
// SAVE DATA
// =====================
function save() {
  localStorage.setItem("notes", JSON.stringify(notes));
}

// =====================
// ADD NOTE
// =====================
function addNote() {
  let input = document.getElementById("inputNote");
  let text = input.value;

  if (!text) return;

  notes.unshift(text); // masuk paling atas
  input.value = "";

  save();
  render();
}

// =====================
// DELETE NOTE
// =====================
function deleteNote(i) {
  notes.splice(i, 1);
  save();
  render();
}

// =====================
// RENDER
// =====================
function render() {
  document.getElementById("list").innerHTML =
    notes.map((n, i) => `
      <div class="note">
        ${n}
        <div class="delete" onclick="deleteNote(${i})">X</div>
      </div>
    `).join("");
}

// =====================
// INIT
// =====================
render();

</script>

</body>
</html>
